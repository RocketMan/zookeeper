<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="shadowGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8" />
      <stop offset="15%" stop-color="#fff" stop-opacity="0" />
      <stop offset="85%" stop-color="#fff" stop-opacity="0" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0.8" />
    </linearGradient>
    <filter id="shadowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
    </filter>
  </defs>
  <rect x="25" y="25" width="150" height="150" fill="white" fill-opacity="0.05" />
  <rect x="20" y="30" width="160" height="160" fill="url(#shadowGradient)" filter="url(#shadowBlur)" />
  <rect x="25" y="25" width="150" height="150" fill="url(#highlightGradient)" />
  <rect x="25" y="25" width="150" height="150" fill="none" stroke="white" stroke-width="1" />
</svg>
